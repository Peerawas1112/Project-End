<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Anatomy AR Learning System</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* =========================================
   1. Base & Reset
   ========================================= */
:root { --primary: #ff4757; --bg: #020617; --glass: rgba(15, 23, 42, 0.85); --border: rgba(255, 255, 255, 0.15); }
body{ margin:0; padding:0; font-family:Kanit,sans-serif; background:var(--bg); color:white; height:100vh; width: 100vw; overflow:hidden; }
* { box-sizing: border-box; }

/* Progress Bar Custom */
#load-shell { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #1e293b; z-index: 2000; display: none; }
#load-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }

/* =========================================
   2. Home & Quiz Pages
   ========================================= */
.home, .quiz-page { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; background:var(--bg); z-index:1000; padding: 20px; }
.quiz-page { display:none; }
.box { width:100%; max-width:480px; max-height: 90vh; overflow-y: auto; background:var(--glass); border-radius:28px; padding:35px; text-align:center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.box::-webkit-scrollbar { display: none; }

/* Buttons */
button { padding:14px 20px; border:none; border-radius:16px; background:var(--primary); color:white; font-size:1rem; cursor:pointer; transition: 0.2s; font-family: Kanit; font-weight: 500; }
button:active { transform: scale(0.95); }
button:disabled { background: #475569; opacity: 0.5; cursor: not-allowed; }

/* Quiz Styles */
.choice { background:#1e293b; padding:16px; border-radius:16px; margin:12px 0; cursor:pointer; text-align: left; border: 1px solid transparent; transition: 0.2s; }
.choice:hover { background: #334155; }
.choice.correct { background:#16a34a !important; border-color: #4ade80; }
.choice.wrong { background:#dc2626 !important; border-color: #f87171; }
.choice.disabled { pointer-events: none; }
.grade-text { font-size: 4rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
.timer-container { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; margin: 15px 0; overflow: hidden; }
#timerBar { width: 100%; height: 100%; background: var(--primary); transition: width 1s linear; }

/* =========================================
   3. Main AR Workspace
   ========================================= */
.main { position:fixed; top:0; left:0; width:100vw; height:100vh; display: none; z-index: 1; }
model-viewer { width:100%; height:100%; --poster-color: transparent; outline: none; }

/* Header */
.app-header { position: absolute; top:0; left:0; width:100%; height: 60px; display: none; align-items: center; justify-content: space-between; padding: 0 max(20px, env(safe-area-inset-left)) 0 max(20px, env(safe-area-inset-right)); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 500; }

/* UI Overlays */
.tabs, .menu { position: absolute; display: none; gap: 10px; z-index: 100; pointer-events: none; }
.tab-btn, .menu-item { pointer-events: auto; background: rgba(15, 23, 42, 0.9); border: 1px solid var(--border); border-radius: 16px; color: white; cursor: pointer; text-align: center; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.tab-btn.active, .menu-item.active { background: var(--primary); border-color: var(--primary); font-weight: 500; }

.info-panel { position: absolute; background: var(--glass); border-radius: 24px; border: 1px solid var(--border); pointer-events: auto; z-index: 10; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
model-viewer > button[slot="ar-button"] { position: absolute; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 200; font-family: Kanit; font-weight: 500; }

/* =========================================
   ปุ่มสลับโหมด (Toggle Mode Button)
   ========================================= */
.toggle-mode-btn {
    position: absolute;
    top: 80px; 
    right: 20px;
    background: rgba(15, 23, 42, 0.9);
    color: white;
    border: 1px solid var(--primary);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 0.9rem;
    z-index: 200;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    display: none; 
    align-items: center;
    transition: 0.3s;
}
.toggle-mode-btn:hover { background: var(--primary); }

/* =========================================
   สไตล์สำหรับหน้าต่างป๊อปอัป (Hotspot Modal)
   ========================================= */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
    display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px;
    opacity: 0; animation: fadeIn 0.3s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }

.modal-box {
    background: var(--glass); border: 1px solid var(--border); border-radius: 24px;
    padding: 25px; width: 100%; max-width: 400px; text-align: center; color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    transform: scale(0.95); animation: popUp 0.3s forwards ease-out;
}
@keyframes popUp { to { transform: scale(1); } }

.modal-title { color: var(--primary); font-size: 1.3rem; margin: 0 0 12px 0; }
.modal-desc { font-size: 0.95rem; color: #cbd5e1; line-height: 1.5; margin-bottom: 20px; text-align: left; }
.close-modal-btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-family: 'Kanit'; width: 100%; font-size: 1rem; }

/* =========================================
   ปรับปรุงสไตล์จุด Hotspot (ให้กดง่ายขึ้นบนมือถือ)
   ========================================= */
.Hotspot {
    background: transparent; 
    border: none;
    width: 36px; 
    height: 36px;
    cursor: pointer;
    position: relative;
    outline: none;
    display: flex;
    justify-content: center;
    align-items: center;
}
.Hotspot::after {
    content: '';
    display: block;
    width: 10px;
    height: 10px;
    background: rgba(255, 71, 87, 0.9);
    border: 2px solid white;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    transition: transform 0.2s;
}
.Hotspot:focus::after { transform: scale(1.3); } 

.HotspotAnnotation {
    background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px);
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    color: white; font-family: 'Kanit', sans-serif; font-size: 0.85rem; font-weight: 500;
    left: calc(100% + 2px); 
    padding: 6px 12px; position: absolute; top: 50%; transform: translateY(-50%);
    width: max-content; pointer-events: none;
}

/* =========================================
   4. Layout: Desktop & Tablets
   ========================================= */
@media (min-width: 769px) {
    .tabs { top: 80px; left: 50%; transform: translateX(-50%); flex-direction: row; }
    .tab-btn { padding: 10px 24px; font-size: 1rem; }
    .menu { right: 30px; top: 50%; transform: translateY(-50%); flex-direction: column; }
    .menu-item { padding: 14px 24px; font-size: 1rem; }
    .info-panel { bottom: 40px; left: 50%; transform: translateX(-50%); width: 450px; padding: 24px; }
    #title { font-size: 1.4rem; margin:0; color:var(--primary); }
    #desc { font-size: 0.95rem; line-height: 1.5; color:#cbd5e1; margin: 8px 0 0 0;}
    model-viewer > button[slot="ar-button"] { top: 80px; left: 30px; padding: 12px 24px; font-size: 1.1rem; }
}

/* =========================================
   5. Layout: Mobile Portrait (แนวตั้ง)
   ========================================= */
@media (max-width: 768px) and (orientation: portrait) {
    .tabs { top: 75px; left: 0; width: 100%; justify-content: center; padding: 0 10px; flex-direction: row; }
    .tab-btn { padding: 8px 18px; font-size: 0.9rem; }
    .menu { bottom: 180px; left: 0; width: 100%; flex-direction: row; justify-content: center; padding: 0 15px; flex-wrap: wrap;}
    .menu-item { flex: 1; min-width: 120px; max-width: 160px; padding: 10px 12px; font-size: 0.85rem; white-space: normal; line-height: 1.2; }
    .info-panel { bottom: max(15px, env(safe-area-inset-bottom)); left: 5%; width: 90%; padding: 16px; max-height: 140px; overflow-y: auto; }
    #title { font-size: 1.1rem; margin:0; color:var(--primary); }
    #desc { font-size: 0.85rem; line-height: 1.4; color:#cbd5e1; margin: 6px 0 0 0;}
    model-viewer > button[slot="ar-button"] { bottom: 250px; left: 50%; transform: translateX(-50%); padding: 12px 24px; font-size: 1rem; width: max-content; }
    .toggle-mode-btn { top: 125px; right: 15px; padding: 8px 14px; font-size: 0.85rem; } /* ตำแหน่งปุ่มสลับโหมดบนมือถือ */
}

/* =========================================
   6. Layout: Mobile Landscape (แนวนอน)
   ========================================= */
@media (max-width: 950px) and (max-height: 500px) and (orientation: landscape) {
    .app-header { height: 45px; }
    .tabs { top: 55px; left: max(10px, env(safe-area-inset-left)); flex-direction: column; gap: 8px; }
    .tab-btn { padding: 8px 16px; font-size: 0.85rem; }
    .menu { top: 55px; right: max(10px, env(safe-area-inset-right)); flex-direction: column; gap: 8px; }
    .menu-item { padding: 8px 16px; font-size: 0.85rem; }
    .info-panel { bottom: max(10px, env(safe-area-inset-bottom)); left: max(10px, env(safe-area-inset-left)); width: 45%; max-width: 350px; padding: 12px; max-height: 110px; overflow-y: auto; }
    #title { font-size: 1rem; margin:0; color:var(--primary); }
    #desc { font-size: 0.8rem; line-height: 1.3; color:#cbd5e1; margin: 4px 0 0 0;}
    model-viewer > button[slot="ar-button"] { bottom: max(15px, env(safe-area-inset-bottom)); right: max(15px, env(safe-area-inset-right)); padding: 10px 20px; font-size: 0.9rem; }
    .box { padding: 20px; }
    #qTitle { min-height: 40px; }
    .choice { padding: 10px; margin: 6px 0; }
    .toggle-mode-btn { top: 55px; right: 160px; } /* ขยับหลบเมนูแนวนอน */
}
</style>
</head>

<body>

<div id="hotspotModal" class="modal-overlay">
  <div class="modal-box">
    <h3 id="modalTitle" class="modal-title">ชื่อส่วนประกอบ</h3>
    <div id="modalDesc" class="modal-desc">รายละเอียด...</div>
    <button class="close-modal-btn" onclick="closeHotspotModal()">ปิดหน้าต่าง</button>
  </div>
</div>

<div id="load-shell"><div id="load-bar"></div></div>

<div id="home" class="home">
  <div class="box">
    <h1 style="margin-bottom: 5px;">Human Anatomy AR</h1>
    <p id="loadingText" style="color: #fbbf24; margin-bottom: 25px;">กำลังโหลดข้อมูลบทเรียน...</p>
    
    <button id="btnLearn" onclick="startLearning()" style="width: 100%;" disabled>📚 เข้าบทเรียน AR</button>
    <button onclick="window.location.href='scanner.html'" style="width: 100%; margin-top: 10px; background: #3b82f6;">📷 สแกนรูปภาพใบงาน</button>
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button id="btnPre" onclick="openQuiz('ก่อนเรียน')" style="flex: 1;" disabled>📝 ทดสอบก่อนเรียน</button>
        <button id="btnPost" onclick="openQuiz('หลังเรียน')" style="flex: 1;" disabled>📝 ทดสอบหลังเรียน</button>
    </div>
  </div>
</div>

<div id="quizPage" class="quiz-page">
  <div class="box" id="quizBox">
    <div id="quizHeader">
        <div id="quizType" style="color:var(--primary); font-weight:500; font-size: 1.2rem; margin-bottom: 10px;"></div>
        <div class="timer-container" id="timerContainer"><div id="timerBar"></div></div>
    </div>
    
    <div id="quizBody">
        <h2 id="qTitle" style="font-size: 1.1rem; min-height: 60px; line-height: 1.4;"></h2>
        <div id="qChoices"></div>
        <p id="qProgress" style="font-size: 0.8rem; color: #94a3b8; margin-top: 15px;"></p>
    </div>
    <button id="exitQuizBtn" onclick="closeQuiz()" style="background:none; border:1px solid #4b5563; color:#94a3b8; margin-top:15px; width: 100%;">ยกเลิก / กลับหน้าหลัก</button>
  </div>
</div>

<div class="app-header" id="appHeader">
    <span style="font-size: 1rem; color: #cbd5e1; font-weight: 500;">Anatomy AR</span>
    <button onclick="backToHome()" style="background:none; border:1px solid var(--border); font-size: 0.85rem; padding: 6px 14px;">🏠 กลับหน้าหลัก</button>
</div>

<main class="main" id="mainArea">
  <nav class="tabs" id="tabs"></nav>
  
  <model-viewer id="viewer" autoplay ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto" camera-controls auto-rotate shadow-intensity="1" exposure="1.2" environment-image="neutral">
      <button slot="ar-button">
          📱 ดูแบบ AR ทะลุจอ
      </button>
  </model-viewer>
  
  <button id="toggleModeBtn" class="toggle-mode-btn" onclick="toggleModelMode()">
      👁️ ดูแบบโปร่งแสง
  </button>
  
  <div class="info-panel">
    <h3 id="title"></h3>
    <p id="desc"></p>
  </div>

  <footer class="menu" id="menu"></footer>
</main>

<script>
let data = [], currentQuizData = [], qIndex = 0, score = 0, isAnswered = false;
let timerInterval, timeLeft = 15;
const maxTime = 15;
let currentCorrectText = ""; 
let currentOrganData = null; // เก็บข้อมูลอวัยวะที่เปิดอยู่
let isAltMode = false;       // เก็บสถานะว่าเปิดโหมดโปร่งแสงอยู่หรือไม่

const home = document.getElementById("home");
const quizPage = document.getElementById("quizPage");
const viewer = document.getElementById("viewer");
const tabs = document.getElementById("tabs");
const menu = document.getElementById("menu");
const loadBar = document.getElementById("load-bar");
const loadShell = document.getElementById("load-shell");
const hotspotModal = document.getElementById("hotspotModal");
const toggleBtn = document.getElementById("toggleModeBtn");

// ปิด Modal เมื่อคลิกพื้นที่ว่างด้านนอก (Overlay)
hotspotModal.addEventListener('click', function(e) {
    if (e.target === this) closeHotspotModal();
});

viewer.addEventListener('progress', (e) => {
    loadShell.style.display = "block";
    loadBar.style.width = (e.detail.totalProgress * 100) + "%";
    if(e.detail.totalProgress === 1) {
        setTimeout(() => { loadShell.style.display = "none"; }, 400);
    }
});

// ดึงข้อมูล JSON
fetch("anatomy_data.json?v=" + new Date().getTime())
.then(r => {
    if(!r.ok) throw new Error("ไม่สามารถโหลดไฟล์ข้อมูลได้");
    return r.json();
})
.then(j => {
    data = j.systems;
    renderTabs();
    if (data.length > 0) loadSystem(0);
    
    document.getElementById("loadingText").textContent = "ระบบพร้อมใช้งานแล้ว";
    document.getElementById("loadingText").style.color = "#4ade80"; 
    document.getElementById("btnLearn").disabled = false;
    document.getElementById("btnPre").disabled = false;
    document.getElementById("btnPost").disabled = false;
})
.catch(err => {
    console.error("Error:", err);
    document.getElementById("loadingText").textContent = "ไม่พบไฟล์ฐานข้อมูล (JSON)";
    document.getElementById("loadingText").style.color = "#ef4444";
});

function renderTabs() {
    tabs.innerHTML = data.map((s, i) => `<div class="tab-btn" id="t${i}" onclick="loadSystem(${i})">${s.category}</div>`).join("");
}

function loadSystem(i) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    const activeTab = document.getElementById("t" + i);
    if(activeTab) activeTab.classList.add("active");
    
    if (data[i].items && data[i].items.length > 0) {
        menu.innerHTML = data[i].items.map((o, j) => `<div class="menu-item" id="m${i}${j}" onclick="selectOrgan(${i},${j})">${o.name}</div>`).join("");
        selectOrgan(i, 0);
    } else {
        menu.innerHTML = "";
    }
}

function selectOrgan(i, j) {
    document.querySelectorAll(".menu-item").forEach(m => m.classList.remove("active"));
    const activeMenu = document.getElementById(`m${i}${j}`);
    if(activeMenu) activeMenu.classList.add("active");

    const o = data[i].items[j];
    currentOrganData = o;
    isAltMode = false; // รีเซ็ตโหมดทุกครั้งที่เปลี่ยนอวัยวะ

    viewer.src = o.model_file;
    document.getElementById("title").textContent = o.name;
    document.getElementById("desc").innerHTML = o.description; 

    // เช็คว่ามีโมเดลสำรอง (โปร่งแสง) ไหม ถ้ามีให้แสดงปุ่ม
    if (o.alt_model_file) {
        toggleBtn.style.display = "flex";
        toggleBtn.innerHTML = "👁️ ดูแบบโปร่งแสง";
    } else {
        toggleBtn.style.display = "none";
    }

    // ลบ Hotspot เก่า และสร้างใหม่
    viewer.querySelectorAll('.Hotspot').forEach(hs => hs.remove());

    if (o.hotspots) {
        o.hotspots.forEach((hs, index) => {
            const btn = document.createElement('button');
            btn.className = 'Hotspot';
            btn.setAttribute('slot', `hotspot-${index}`);
            btn.setAttribute('data-position', hs.position);
            btn.setAttribute('data-normal', hs.normal);
            
            const annotation = document.createElement('div');
            annotation.className = 'HotspotAnnotation';
            annotation.textContent = hs.name;
            
            btn.onclick = () => {
                document.getElementById('modalTitle').textContent = hs.name;
                document.getElementById('modalDesc').innerHTML = hs.info || "ไม่มีข้อมูลรายละเอียดเพิ่มเติม"; 
                hotspotModal.style.display = 'flex';
            };
            
            btn.appendChild(annotation);
            viewer.appendChild(btn);
        });
    }
}

// ฟังก์ชันสลับโหมดโมเดล
function toggleModelMode() {
    if (!currentOrganData || !currentOrganData.alt_model_file) return;

    if (isAltMode) {
        // กลับไปโหมดปกติ
        viewer.src = currentOrganData.model_file;
        toggleBtn.innerHTML = "👁️ ดูแบบโปร่งแสง";
        isAltMode = false;
    } else {
        // สลับเป็นโหมดโปร่งแสง
        viewer.src = currentOrganData.alt_model_file;
        toggleBtn.innerHTML = "🫀 กลับสู่โหมดปกติ";
        isAltMode = true;
    }
}

function closeHotspotModal() {
    hotspotModal.style.display = 'none';
}

function startLearning() {
    home.style.display = "none";
    document.getElementById("appHeader").style.display = "flex";
    document.getElementById("mainArea").style.display = "block";
    tabs.style.display = "flex";
    menu.style.display = "flex"; 
}

function backToHome() {
    document.getElementById("appHeader").style.display = "none";
    document.getElementById("mainArea").style.display = "none";
    tabs.style.display = "none";
    menu.style.display = "none";
    home.style.display = "flex";
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function openQuiz(type) {
    let allQuestions = [];
    data.forEach(system => {
        if(system.items) {
            system.items.forEach(item => { if (item.quiz) allQuestions = allQuestions.concat(item.quiz); });
        }
    });

    if (allQuestions.length === 0) return alert("ยังไม่มีคำถามในระบบครับ");

    currentQuizData = shuffleArray([...allQuestions]).slice(0, 5);
    document.getElementById("quizType").textContent = "แบบทดสอบ" + type;
    home.style.display = "none";
    quizPage.style.display = "flex";
    document.getElementById("timerContainer").style.display = "block";
    document.getElementById("exitQuizBtn").style.display = "block";
    qIndex = 0; score = 0;
    showQuestion();
}

function showQuestion() {
    isAnswered = false;
    if (qIndex >= currentQuizData.length) return showResult();
    
    const q = currentQuizData[qIndex];
    currentCorrectText = q.choices[q.answer];
    const shuffledChoices = shuffleArray([...q.choices]);

    document.getElementById("qTitle").textContent = q.question;
    document.getElementById("qChoices").innerHTML = shuffledChoices.map((choiceText) => 
        `<div class="choice" onclick="answer(this)">${choiceText}</div>`
    ).join("");
    
    document.getElementById("qProgress").textContent = `ข้อที่ ${qIndex + 1} / ${currentQuizData.length}`;
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = maxTime;
    const timerBar = document.getElementById("timerBar");
    timerBar.style.width = "100%";
    timerInterval = setInterval(() => {
        timeLeft--;
        timerBar.style.width = (timeLeft / maxTime) * 100 + "%";
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            answer(null);
        }
    }, 1000);
}

function answer(element) {
    if (isAnswered) return;
    isAnswered = true;
    clearInterval(timerInterval);

    const choices = document.querySelectorAll(".choice");
    const selectedText = element ? element.textContent : "";

    choices.forEach((c) => {
        c.classList.add("disabled");
        if (c.textContent === currentCorrectText) c.classList.add("correct");
        if (element && c === element && selectedText !== currentCorrectText) c.classList.add("wrong");
    });

    if (selectedText === currentCorrectText) score++;
    setTimeout(() => { qIndex++; showQuestion(); }, 2000);
}

function showResult() {
    const percent = (score / currentQuizData.length) * 100;
    const grade = percent >= 80 ? "A" : percent >= 70 ? "B" : percent >= 60 ? "C" : percent >= 50 ? "D" : "F";
    
    document.getElementById("qTitle").textContent = "🎉 สรุปผลการทดสอบ";
    document.getElementById("qChoices").innerHTML = `
        <div style="font-size: 1rem; color: #cbd5e1; margin-top:20px;">เกรดที่ได้</div>
        <div class="grade-text">${grade}</div>
        <div style="font-size: 1.5rem; margin-bottom: 20px;">คะแนน: ${score} / ${currentQuizData.length}</div>
        <p style="color: ${percent >= 50 ? '#4ade80' : '#f87171'}; font-size: 1.1rem;">
            ${percent >= 50 ? 'เยี่ยมมาก! ผ่านเกณฑ์แล้วครับ ✨' : 'สู้ๆ นะครับ ลองทบทวนเนื้อหาใหม่อีกครั้ง 📚'}
        </p>
        <button onclick="closeQuiz()" style="width:100%; margin-top:20px; padding: 16px;">กลับหน้าหลัก</button>
    `;
    document.getElementById("qProgress").textContent = "";
    document.getElementById("timerContainer").style.display = "none";
    document.getElementById("exitQuizBtn").style.display = "none";
}

function closeQuiz() {
    clearInterval(timerInterval);
    quizPage.style.display = "none";
    home.style.display = "flex";
}
</script>
</body>
</html>
